<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/submit">Submit Code</a>
            <a href="/reviews">Review Dashboard</a>
            <a href="/profile">Profile</a>
            <a href="/stats">Statistics</a>
        </nav>
    </header>
    <main class="bg-light">
        <div class="container mt-5">
            <h1 class="text-primary">Submit Your Code</h1>
            <form action="/api/code/submit" method="post">
                <div class="mb-3">
                    <label for="user_id" class="form-label">User ID</label>
                    <input type="number" class="form-control" id="user_id" name="user_id" required>
                </div>
                <div class="mb-3">
                    <label for="code" class="form-label">Code</label>
                    <textarea class="form-control" id="code" name="code" rows="10" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2023 AI-Powered Code Review Assistant</p>
        </div>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
